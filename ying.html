<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nội Soi Thiên Đạo v3.0</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; line-height: 1.4; }
        .input-box { background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; background: #000; color: #00ff00; border: 1px solid #00ff00; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; background: #00ff00; color: #000; font-weight: bold; border: none; cursor: pointer; }
        #console { background: #000; border: 1px solid #333; padding: 15px; height: 400px; overflow-y: auto; font-size: 12px; border-radius: 5px; }
        .error { color: #ff4444; }
        .success { color: #ffff00; font-weight: bold; background: #1a3a1a; padding: 5px; }
        .info { color: #00d2ff; }
        .final-code { background: #222; color: #fff; padding: 15px; margin-top: 20px; border-left: 5px solid #ffff00; display: none; }
    </style>
</head>
<body>

    <h2>🔍 NỘI SOI THIÊN ĐẠO V3.0</h2>
    
    <div class="input-box">
        <label>Nhập API Key (Linh thạch):</label>
        <input type="text" id="apiKey" placeholder="AIzaSy...">
        <button onclick="batDauNoiSoi()">BẮT ĐẦU NỘI SOI TOÀN DIỆN</button>
    </div>

    <div id="console">--- Chờ mệnh lệnh... ---</div>

    <div id="finalCode" class="final-code">
        <h3>✅ KẾT QUẢ: DÒNG CODE CHIẾN THẮNG</h3>
        <p>Hãy copy dòng này dán vào hàm fetch trong game của bạn:</p>
        <code id="codeSnippet"></code>
    </div>

<script>
    const logBox = document.getElementById('console');
    
    function log(msg, type = '') {
        const div = document.createElement('div');
        div.className = type;
        div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logBox.appendChild(div);
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function batDauNoiSoi() {
        const key = document.getElementById('apiKey').value.trim();
        if(!key) return alert("Chưa nhập Key!");
        
        logBox.innerHTML = "";
        log("Bắt đầu nội soi thực thi mệnh lệnh...", "info");
        
        // Bước 1: Liệt kê tất cả model mà Key này có quyền truy cập
        log("Bước 1: Truy vấn danh sách Model từ Google Cloud...");
        let availableModels = [];
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            const data = await res.json();
            if(data.error) throw new Error(data.error.message);
            
            availableModels = data.models
                .filter(m => m.supportedGenerationMethods.includes("generateContent"))
                .map(m => m.name.replace("models/", ""));
            
            log(`Tìm thấy ${availableModels.length} model khả dụng.`, "success");
        } catch(e) {
            log(`THẤT BẠI BƯỚC 1: ${e.message}`, "error");
            return;
        }

        // Bước 2: Test từng model một với bài toán "Viết cốt truyện"
        log("Bước 2: Kiểm tra khả năng viết cốt truyện (Thử từng Model)...", "info");
        
        // Ưu tiên các model mạnh trước
        const priorityModels = ["gemini-2.0-flash", "gemini-1.5-flash", "gemini-pro"];
        const testList = [...new Set([...priorityModels, ...availableModels])];

        for (let mName of testList) {
            log(`Đang thử Model: <b>${mName}</b>...`);
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${mName}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Viết 1 câu ngắn về tu tiên gặp kỳ ngộ." }] }]
                    })
                });

                const result = await response.json();

                if(result.error) {
                    log(`-> Từ chối: ${result.error.status} - ${result.error.message.substring(0,50)}...`, "error");
                    continue;
                }

                if(result.candidates && result.candidates[0].content) {
                    const story = result.candidates[0].content.parts[0].text;
                    log(`=> THÀNH CÔNG! AI viết: "${story}"`, "success");
                    
                    // Hiện kết quả cuối cùng
                    document.getElementById('finalCode').style.display = "block";
                    document.getElementById('codeSnippet').innerText = 
                        `fetch("https://generativelanguage.googleapis.com/v1beta/models/${mName}:generateContent?key=\${key}", ... )`;
                    
                    log("--- NỘI SOI KẾT THÚC: ĐÃ TÌM THẤY ĐƯỜNG TRUYỀN CHUẨN ---", "success");
                    return;
                }
            } catch(e) {
                log(`-> Lỗi kết nối: ${e.message}`, "error");
            }
        }

        log("TẤT CẢ MODEL ĐỀU THẤT BẠI. Có thể do khu vực (Region) bị chặn hoặc Key chưa kích hoạt Billing.", "error");
    }
</script>
</body>
</html>
