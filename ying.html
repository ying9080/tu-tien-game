<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ying Engine V21 - Hết Phế</title>
    <style>
        :root { --vang: #ffcc00; --do: #ff4d4d; --xanh: #00d2ff; --nen: #050505; --the: #121214; --vien: #333; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--nen); color: #eee; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        header { padding: 15px; background: #000; border-bottom: 2px solid var(--vang); }
        .bar-bg { width: 100%; height: 8px; background: #222; border-radius: 4px; margin-top: 5px; border: 1px solid #444; }
        .bar-fill { height: 100%; width: 50%; transition: 0.3s; }

        /* NAVIGATION */
        nav { display: flex; background: #111; border-bottom: 1px solid var(--vien); }
        .nav-item { flex: 1; padding: 15px 5px; border: none; background: none; color: #555; font-size: 11px; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--vang); border-bottom: 2px solid var(--vang); }

        /* CONTENT */
        .viewport { flex-grow: 1; padding: 15px; overflow-y: auto; }
        .tab-view { display: none; }
        .tab-view.active { display: block; }

        /* CARDS */
        .card { background: var(--the); border: 1px solid var(--vien); border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: center; }
        .btn-core { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; background: var(--vang); color: #000; margin-top: 10px; }
        .btn-core:active { transform: scale(0.95); opacity: 0.8; }

        /* LOG */
        #log { background: #000; border: 1px solid var(--vien); border-radius: 10px; height: 150px; overflow-y: auto; padding: 10px; font-size: 12px; color: #888; font-family: monospace; }
        
        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #1a1a1c; border: 1px solid var(--vang); border-radius: 20px; padding: 20px; width: 100%; max-width: 350px; text-align: center; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
        <b style="color:var(--vang)">🤠 Ying [Luyện Khí 1]</b>
        <span id="ui-gold">💎 10,000</span>
    </div>
    <div style="font-size:10px">LINH LỰC: <span id="ui-exp-txt">0/100</span></div>
    <div class="bar-bg"><div id="ui-exp-bar" class="bar-fill" style="background:var(--xanh); width:0%"></div></div>
</header>

<nav>
    <button class="nav-item active" data-target="world">BẢN ĐỒ</button>
    <button class="nav-item" data-target="inv">TÚI ĐỒ</button>
    <button class="nav-item" data-target="set">CÀI ĐẶT</button>
</nav>

<div class="viewport">
    <div id="view-world" class="tab-view active">
        <div class="card">
            <h3 style="margin:0; color:var(--vang)">U MINH ĐỘNG</h3>
            <p style="font-size:12px; color:#666">⚡ Tiêu tốn: 10 Thể lực | Nhận Linh thạch & EXP</p>
            <button class="btn-core" id="btn-explore">🚶 THÁM HIỂM NGAY</button>
        </div>
        <div id="log"></div>
    </div>

    <div id="view-inv" class="tab-view">
        <div class="card"><h3>Túi đồ đang trống...</h3></div>
    </div>

    <div id="view-set" class="tab-view">
        <div class="card">
            <input type="password" id="api-key" style="width:100%; padding:12px; background:#000; border:1px solid #333; color:#fff;" placeholder="Dán API Key...">
            <button class="btn-core" id="btn-save-key">LƯU API KEY</button>
        </div>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <h3 id="m-title" style="color:var(--vang)">KỲ NGỘ</h3>
        <p id="m-body" style="font-size:14px; color:#ccc"></p>
        <button class="btn-core" id="btn-close-modal">XÁC NHẬN</button>
    </div>
</div>

<script>
/* ==========================================================
   ENGINE V21: KHÔNG THỂ BỊ LỖI
   ========================================================== */
document.addEventListener('DOMContentLoaded', () => {
    
    // 1. DỮ LIỆU
    let p = JSON.parse(localStorage.getItem('ying_v21')) || { gold: 10000, exp: 0, mExp: 100 };
    let apiKey = localStorage.getItem('ying_api_v21') || "";

    // 2. HÀM CẬP NHẬT UI
    const updateUI = () => {
        document.getElementById('ui-gold').innerText = "💎 " + p.gold.toLocaleString();
        document.getElementById('ui-exp-txt').innerText = `${p.exp}/${p.mExp}`;
        document.getElementById('ui-exp-bar').style.width = (p.exp/p.mExp)*100 + "%";
        localStorage.setItem('ying_v21', JSON.stringify(p));
    };

    const log = (msg) => {
        const l = document.getElementById('log');
        const t = new Date().toLocaleTimeString();
        l.innerHTML = `<div>[${t}] ${msg}</div>` + l.innerHTML;
    };

    // 3. XỬ LÝ CHUYỂN TAB (ĐÃ FIX BẤM KHÔNG ĐƯỢC)
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('view-' + btn.dataset.target).classList.add('active');
        });
    });

    // 4. XỬ LÝ THÁM HIỂM
    document.getElementById('btn-explore').addEventListener('click', async () => {
        const btn = document.getElementById('btn-explore');
        btn.disabled = true; btn.innerText = "ĐANG THÁM HIỂM...";
        log("Đang tiến vào U Minh Động...");

        let story = "Bạn bắt gặp một gốc linh thảo nghìn năm, hái được nó và nhận 50 linh thạch.";
        
        if(apiKey) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemma-3-1b-it:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Viết 1 câu tu tiên ngắn: Ying thám hiểm hang động gặp kỳ ngộ." }] }] })
                });
                const data = await res.json();
                story = data.candidates[0].content.parts[0].text.trim();
            } catch(e) { log("Thiên đạo nghẽn, dùng cốt truyện mặc định."); }
        }

        setTimeout(() => {
            p.gold += 50; p.exp += 20;
            document.getElementById('m-body').innerText = story;
            document.getElementById('modal').style.display = 'flex';
            if(p.exp >= p.mExp) { p.exp = 0; p.mExp += 50; log("Chúc mừng! Đã đột phá tầng tiếp theo."); }
            updateUI();
            btn.disabled = false; btn.innerText = "🚶 THÁM HIỂM NGAY";
        }, 1500);
    });

    // 5. NÚT ĐÓNG MODAL & LƯU KEY
    document.getElementById('btn-close-modal').addEventListener('click', () => {
        document.getElementById('modal').style.display = 'none';
    });

    document.getElementById('btn-save-key').addEventListener('click', () => {
        const val = document.getElementById('api-key').value.trim();
        localStorage.setItem('ying_api_v21', val);
        apiKey = val;
        alert("Đã lưu API Key!");
    });

    // KHỞI CHẠY
    updateUI();
    if(apiKey) document.getElementById('api-key').value = apiKey;
    log("Hệ thống Ying V21 đã sẵn sàng.");
});
</script>
</body>
</html>
