<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><title>Kính Chiếu Yêu v2.0</title></head>
<body style="background:#000; color:#fff; font-family:sans-serif; text-align:center; padding:20px;">
    <h2>KÍNH CHIẾU YÊU v2.0</h2>
    <input type="text" id="key" style="width:80%; padding:15px; background:#222; color:#fff; border:1px solid #444;" placeholder="Dán API Key vào đây...">
    <br><button onclick="check()" style="padding:15px 30px; background:#ffcc00; border:none; margin-top:10px; font-weight:bold;">SOI MODEL KHẢ DỤNG</button>
    <div id="out" style="margin-top:20px; text-align:left; background:#111; padding:15px; border-radius:8px; font-size:12px; border:1px solid #333; white-space:pre-wrap;"></div>

    <script>
        async function check() {
            const key = document.getElementById('key').value.trim();
            const out = document.getElementById('out');
            if(!key) return alert("Chưa nhập Key!");
            out.innerHTML = "Đang hỏi Thiên Đạo...\n";

            try {
                // Gọi lệnh liệt kê Model của Google
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await res.json();

                if (data.error) {
                    out.innerHTML = `<span style="color:red">❌ THẤT BẠI: ${data.error.status}\nLý do: ${data.error.message}</span>`;
                } else {
                    out.innerHTML = `<span style="color:green">✅ THÀNH CÔNG! Key của bạn dùng được các Model sau:</span>\n`;
                    data.models.forEach(m => {
                        if(m.supportedGenerationMethods.includes("generateContent")) {
                            out.innerHTML += `- ${m.name}\n`;
                        }
                    });
                    out.innerHTML += `\n==> Hãy copy cái tên nào có chữ 'gemini-1.5-flash' hoặc 'gemini-pro' để dùng!`;
                }
            } catch (e) {
                out.innerHTML = `❌ Lỗi kết nối mạng: ${e.message}`;
            }
        }
    </script>
</body>
</html>
