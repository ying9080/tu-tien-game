<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ying Engine - Tu Tiên Framework</title>
    <style>
        /* --- 1. CSS VARIABLES (Dễ dàng đổi màu toàn game tại đây) --- */
        :root {
            --gold: #ffcc00; --bg: #0a0a0b; --card: #161618;
            --border: #2a2a2a; --text: #eee; --dim: #888;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- 2. LAYOUT CỐ ĐỊNH (Khung sườn) --- */
        header { padding: 15px; background: #000; border-bottom: 2px solid var(--gold); flex-shrink: 0; }
        nav { display: flex; background: #111; overflow-x: auto; flex-shrink: 0; border-bottom: 1px solid var(--border); }
        main { flex-grow: 1; padding: 15px; overflow-y: auto; position: relative; }
        .tab-view { display: none; } .tab-view.active { display: block; }

        /* --- 3. UI COMPONENTS (Các linh kiện dùng chung) --- */
        .nav-btn { flex: 1; padding: 15px 10px; border: none; background: none; color: var(--dim); font-size: 11px; font-weight: bold; white-space: nowrap; cursor: pointer; }
        .nav-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); background: #1a1a1a; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .btn-core { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-core:active { transform: scale(0.98); }

        /* Khung nhật ký (Log) */
        .game-log { background: #000; border: 1px solid var(--border); border-radius: 10px; height: 150px; overflow-y: auto; padding: 10px; font-size: 13px; font-family: monospace; }
        
        /* Modal Hệ thống (Pop-up ảnh 21) */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: #1a1a1c; border: 1px solid var(--gold); border-radius: 20px; padding: 25px; width: 100%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

<header id="ui-header">
    <div style="display:flex; justify-content:space-between">
        <b id="p-lv" style="color:var(--gold)">Cảnh Giới: ...</b>
        <span id="p-gold">💎 0</span>
    </div>
    <div id="p-bars" style="margin-top:10px"></div>
</header>

<nav id="navbar">
    <button class="nav-btn active" onclick="Engine.switchTab('world', this)">THẾ GIỚI</button>
    <button class="nav-btn" onclick="Engine.switchTab('sect', this)">MÔN PHÁI</button>
    <button class="nav-btn" onclick="Engine.switchTab('inv', this)">TÚI ĐỒ</button>
    <button class="nav-btn" onclick="Engine.switchTab('task', this)">NHIỆM VỤ</button>
    <button class="nav-btn" onclick="Engine.switchTab('set', this)">CÀI ĐẶT</button>
</nav>

<main id="game-main">
    <div id="view-world" class="tab-view active">
        <div id="location-list"></div> <div class="game-log" id="main-log"></div>
    </div>

    <div id="view-sect" class="tab-view">
        <div id="sect-content"></div> </div>

    <div id="view-inv" class="tab-view">
        <div id="inv-grid" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:5px"></div>
    </div>

    <div id="view-set" class="tab-view">
        <div class="card">
            <input type="password" id="api-key" style="width:100%; padding:10px" placeholder="Dán API Key...">
            <button class="btn-core" style="margin-top:10px; background:var(--gold)" onclick="Engine.saveKey()">LƯU KEY</button>
        </div>
    </div>
</main>

<div class="modal" id="game-modal">
    <div class="modal-body" id="modal-container">
        </div>
</div>

<script>
/* ==========================================================
   1. DATABASE: NƠI THÊM NGUYÊN LIỆU (SAU NÀY ÔNG ĐỔ VÀO ĐÂY)
   ========================================================== */
const Db = {
    sects: [],      // Danh sách môn phái (Thiếu Lâm, Minh Giáo...)
    locations: [],  // Danh sách bản đồ (U Minh Động, Vạn Kiếp Sơn...)
    items: [],      // Danh sách trang bị, đan dược
    missions: [],   // Danh sách nhiệm vụ hằng ngày
    levels: ["Phàm Nhân", "Luyện Khí", "Trúc Cơ", "Kết Đan", "Nguyên Anh"] 
};

/* ==========================================================
   2. STATE: QUẢN LÝ DỮ LIỆU NHÂN VẬT (BỘ NÃO)
   ========================================================== */
const State = {
    p: JSON.parse(localStorage.getItem('ying_save')) || {
        name: "Ying", lv: 0, exp: 0, mExp: 100,
        hp: 100, mHp: 100, gold: 0, atk: 10, def: 5,
        inv: [], activeSect: null
    },
    apiKey: localStorage.getItem('ying_api') || ""
};

/* ==========================================================
   3. ENGINE: HỆ THỐNG VẬN HÀNH (CƠ CHẾ GAME)
   ========================================================== */
const Engine = {
    // Chuyển đổi giữa các hệ thống
    switchTab: (tabId, btn) => {
        document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + tabId).classList.add('active');
        btn.classList.add('active');
        // Gọi hàm render tương ứng nếu cần
    },

    // Hệ thống Log nhật ký
    log: (msg, color = "#aaa") => {
        const l = document.getElementById('main-log');
        l.innerHTML = `<div style="color:${color}; margin-bottom:5px">> ${msg}</div>` + l.innerHTML;
    },

    // Hệ thống Pop-up (Dùng cho kỳ ngộ, chiến đấu, đối thoại)
    openModal: (html) => {
        const m = document.getElementById('game-modal');
        document.getElementById('modal-container').innerHTML = html;
        m.style.display = 'flex';
    },
    closeModal: () => { document.getElementById('game-modal').style.display = 'none'; },

    // Lưu trữ API cho AI
    saveKey: () => {
        const key = document.getElementById('api-key').value.trim();
        State.apiKey = key;
        localStorage.setItem('ying_api', key);
        Engine.log("Thiên Đạo ghi nhận API Key thành công!", "#00d2ff");
    },

    // Cập nhật giao diện toàn cục
    updateUI: () => {
        document.getElementById('p-lv').innerText = `${Db.levels[State.p.lv]} (Tầng ${Math.floor(State.p.exp/10)+1})`;
        document.getElementById('p-gold').innerText = `💎 ${State.p.gold}`;
        // Lưu dữ liệu vào máy
        localStorage.setItem('ying_save', JSON.stringify(State.p));
    }
};

/* ==========================================================
   KHỞI CHẠY HỆ THỐNG
   ========================================================== */
window.onload = () => {
    Engine.updateUI();
    Engine.log("Khung xương V18 đã sẵn sàng để tiếp nhận nguyên liệu.");
    if(State.apiKey) document.getElementById('api-key').value = State.apiKey;
};
</script>
</body>
</html>
