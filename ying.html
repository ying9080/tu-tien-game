<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Tiên Simulator v4.0</title>
    <style>
        :root { --gold: #ff9800; --bg: #000; --panel: #1a1a1a; --red: #ff4444; --blue: #2196f3; --green: #4caf50;}
        body { margin: 0; background: #121212; color: #fff; font-family: sans-serif; font-size: 14px; user-select: none; }
        .header { background: var(--bg); padding: 15px; border-bottom: 2px solid #333; position: sticky; top: 0; z-index: 100;}
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; margin-top: 5px; }
        .bar-container { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-top: 2px; }
        .bar-fill { height: 100%; transition: width 0.3s; }
        .nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 5px; background: #000; }
        .nav-btn { background: #2a2a2a; border: none; color: #fff; padding: 12px 0; font-size: 11px; border-radius: 4px; font-weight: bold;}
        .nav-btn.active { background: var(--gold); color: #000; }
        .content { padding: 15px; min-height: 400px; padding-bottom: 80px; }
        .tab-content { display: none; }
        .active { display: block; }
        .panel { background: var(--panel); border-radius: 10px; padding: 15px; border: 1px solid #333; text-align: center; margin-bottom: 15px;}
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; margin-top: 10px; cursor: pointer; color: #000; }
        .log-box { background: #000; border: 1px solid var(--gold); padding: 10px; border-radius: 8px; height: 150px; overflow-y: auto; font-size: 13px; color: #d4af37; line-height: 1.4; text-align: left; margin-top: 10px;}
        .item-slot { background: #222; border: 1px solid #444; padding: 10px; margin-bottom: 5px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .api-input { width: 100%; padding: 12px; background: #333; color: white; border: 1px solid #555; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="header">
    <div style="display:flex; justify-content:space-between; font-size: 16px;">
        <b><span id="p-name">Ying</span> - <span id="p-level" style="color:var(--gold)">Phàm Cốt Tầng 1</span></b>
    </div>
    <div class="stat-grid">
        <div>❤️ HP: <span id="val-hp">100/100</span>
            <div class="bar-container"><div id="bar-hp" class="bar-fill" style="width:100%; background:var(--red)"></div></div>
        </div>
        <div>⚡ Linh Lực: <span id="val-mp">0/100</span>
            <div class="bar-container"><div id="bar-mp" class="bar-fill" style="width:0%; background:var(--blue)"></div></div>
        </div>
        <div>⚔️ Công: <span id="val-atk" style="color:var(--gold)">10</span> | 🛡️ Thủ: <span id="val-def" style="color:var(--blue)">5</span></div>
        <div>⏳ Thọ: <span id="val-age" style="color:var(--green)">18/100</span> | 💰 Linh Thạch: <span id="val-gold" style="color:var(--gold)">0</span></div>
    </div>
</div>

<div class="nav-grid">
    <button class="nav-btn active" onclick="showTab('tab-tu-luyen', this)">Tu Luyện</button>
    <button class="nav-btn" onclick="showTab('tab-lich-luyen', this)">Lịch Luyện</button>
    <button class="nav-btn" onclick="showTab('tab-tui-do', this)">Túi Đồ</button>
    <button class="nav-btn" onclick="showTab('tab-cai-dat', this)">Cài Đặt</button>
</div>

<div class="content">
    <div id="tab-tu-luyen" class="tab-content active">
        <div class="panel">
            <h3>Bế Quan</h3>
            <button id="btn-train" class="btn-action" style="background:#fff" onclick="tuLuyen()">🧘 VẬN CÔNG (+25 EXP)</button>
            <button id="btn-break" class="btn-action" style="background:var(--gold); display:none" onclick="dotPha()">🔥 ĐỘT PHÁ</button>
        </div>
    </div>

    <div id="tab-lich-luyen" class="tab-content">
        <div class="panel">
            <h3 style="color: var(--blue)">Vạn Yêu Sơn Mạch</h3>
            <button class="btn-action" style="background:var(--blue); color:#fff" onclick="lichLuyen()" id="btn-explore">🚶 THÁM HIỂM (GỌI AI)</button>
        </div>
    </div>

    <div id="tab-tui-do" class="tab-content">
        <div class="panel">
            <h3>Hành Trang</h3>
            <div id="inventory-list">
                <p style="color:#666">Trống rỗng...</p>
            </div>
        </div>
    </div>

    <div id="tab-cai-dat" class="tab-content">
        <div class="panel" style="text-align: left;">
            <h3>Cài Đặt Gemini API</h3>
            <input type="password" id="api-key-input" class="api-input" placeholder="Dán API Key vào đây...">
            <button class="btn-action" style="background: var(--green); color: white;" onclick="saveAPI()">💾 LƯU LINH THẠCH</button>
            <p style="font-size: 10px; color:#888; margin-top:10px;">* Lưu ý: API Key của bạn chỉ được lưu trên trình duyệt này.</p>
        </div>
    </div>

    <div class="log-box" id="log">
        <div>> Hệ thống V4.0 đã sẵn sàng.</div>
    </div>
</div>

<script>
    let player = {
        levelIdx: 0,
        levels: ["Phàm Cốt Tầng 1", "Phàm Cốt Tầng 5", "Phàm Cốt Tầng 9", "Luyện Khí Tầng 1", "Trúc Cơ Sơ Kỳ"],
        hp: 100, maxHp: 100, exp: 0, maxExp: 100, age: 18, maxAge: 100, gold: 0,
        atk: 10, def: 5, items: []
    };

    window.onload = () => {
        let key = localStorage.getItem('gemini_api_key');
        if(key) {
            document.getElementById('api-key-input').value = key;
            addLog("<span style='color:var(--green)'>Thiên Đạo đã nhận diện API Key.</span>");
        }
        updateUI();
    };

    function addLog(msg) {
        const l = document.getElementById('log');
        l.innerHTML = `<div>> ${msg}</div>` + l.innerHTML;
    }

    function showTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function saveAPI() {
        let key = document.getElementById('api-key-input').value;
        localStorage.setItem('gemini_api_key', key);
        addLog("Đã lưu API Key mới!");
    }

    function updateUI() {
        document.getElementById('val-hp').innerText = `${player.hp}/${player.maxHp}`;
        document.getElementById('bar-hp').style.width = (player.hp/player.maxHp)*100 + "%";
        document.getElementById('val-mp').innerText = `${player.exp}/${player.maxExp}`;
        document.getElementById('bar-mp').style.width = (player.exp/player.maxExp)*100 + "%";
        document.getElementById('val-age').innerText = player.age;
        document.getElementById('val-gold').innerText = player.gold;
        document.getElementById('val-atk').innerText = player.atk;
        document.getElementById('val-def').innerText = player.def;
        document.getElementById('p-level').innerText = player.levels[player.levelIdx];

        if(player.exp >= player.maxExp) {
            document.getElementById('btn-train').style.display = 'none';
            document.getElementById('btn-break').style.display = 'block';
        } else {
            document.getElementById('btn-train').style.display = 'block';
            document.getElementById('btn-break').style.display = 'none';
        }
        
        // Cập nhật túi đồ
        const inv = document.getElementById('inventory-list');
        if(player.items.length === 0) inv.innerHTML = "<p style='color:#666'>Trống rỗng...</p>";
        else {
            inv.innerHTML = player.items.map(i => `<div class="item-slot"><span>${i.name}</span> <small>${i.type}</small></div>`).join('');
        }
    }

    function tuLuyen() {
        if(player.age >= player.maxAge) return addLog("Đã hết thọ nguyên!");
        player.exp += 25;
        player.age += 1;
        addLog("Tu luyện 1 năm, linh lực tăng tiến.");
        updateUI();
    }

    function dotPha() {
        if(Math.random() > 0.4) {
            player.levelIdx++; player.exp = 0; player.maxExp += 50; player.maxAge += 20;
            player.atk += 5; player.def += 3;
            addLog(`<span style='color:var(--green)'>Đột phá thành công lên ${player.levels[player.levelIdx]}!</span>`);
        } else {
            player.hp -= 20; addLog("<span style='color:red'>Đột phá thất bại, kinh mạch bị thương!</span>");
        }
        updateUI();
    }

    async function lichLuyen() {
        const key = localStorage.getItem('gemini_api_key');
        if(!key) return addLog("Lỗi: Chưa nhập API Key!");
        
        const btn = document.getElementById('btn-explore');
        btn.disabled = true; btn.innerText = "ĐANG GỌI THIÊN ĐẠO...";

        let roll = Math.random();
        let type = roll < 0.3 ? "XUI" : (roll < 0.8 ? "BT" : "VIP");
        let prompt = `Viết 1 câu tu tiên cực ngắn (10 chữ) về việc: ${type === "XUI" ? "bị quái đánh" : "nhặt được tiền"}`;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await res.json();
            if(data.error) throw new Error(data.error.message);

            let txt = data.candidates[0].content.parts[0].text;
            if(type === "XUI") { player.hp -= 15; addLog(`🔴 ${txt} (-15 HP)`); }
            else if(type === "BT") { player.gold += 30; addLog(`🟡 ${txt} (+30 L.Thạch)`); }
            else { 
                player.items.push({name: "Kiếm Gỗ", type: "Vũ Khí"}); 
                player.atk += 2;
                addLog(`🟣 ${txt} (Nhận Kiếm Gỗ +2 Công)`); 
            }
        } catch(e) {
            addLog(`<span style='color:red'>Thiên Đạo từ chối: ${e.message.substring(0,30)}...</span>`);
            addLog("<i>Nhưng bạn vẫn nhặt được 5 Linh Thạch lẻ.</i>");
            player.gold += 5;
        }
        
        btn.disabled = false; btn.innerText = "🚶 THÁM HIỂM (GỌI AI)";
        updateUI();
    }
</script>
</body>
</html>
