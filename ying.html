<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ying Engine V20 - Thần Cơ Diệu Toán</title>
    <style>
        :root {
            --vang: #ffcc00; --do: #ff4d4d; --xanh-linh: #00d2ff; --xanh-the: #2ecc71;
            --nen: #080808; --the: #121214; --vien: #252525; --chu: #e0e0e0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--nen); color: var(--chu); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- UI HEADER (Ảnh 168) --- */
        .header { padding: 15px; background: #000; border-bottom: 2px solid var(--vang); flex-shrink: 0; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .p-name { font-weight: bold; color: var(--vang); font-size: 16px; text-shadow: 0 0 5px rgba(255,204,0,0.3); }
        .combat-pwr { color: #ff8800; font-size: 13px; font-weight: bold; }
        
        .stat-group { margin-bottom: 5px; }
        .stat-info { display: flex; justify-content: space-between; font-size: 10px; color: #888; margin-bottom: 2px; }
        .bar-bg { width: 100%; height: 6px; background: #1a1a1a; border-radius: 3px; overflow: hidden; border: 0.5px solid #333; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        /* --- NAVIGATION --- */
        .nav { display: flex; background: #111; overflow-x: auto; flex-shrink: 0; border-bottom: 1px solid var(--vien); }
        .nav-item { flex: 1; padding: 15px 5px; border: none; background: none; color: #555; font-size: 10px; font-weight: bold; white-space: nowrap; cursor: pointer; border-bottom: 2px solid transparent; }
        .nav-item.active { color: var(--vang); border-bottom-color: var(--vang); background: #161618; }

        /* --- CONTENT AREA --- */
        .viewport { flex-grow: 1; padding: 15px; overflow-y: auto; position: relative; }
        .view-tab { display: none; animation: fadeIn 0.3s ease; }
        .view-tab.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- CARDS & LISTS --- */
        .card { background: var(--the); border: 1px solid var(--vien); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .map-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .map-node { background: #1a1a1a; padding: 12px; border-radius: 8px; border: 1px solid #333; text-align: center; cursor: pointer; }
        .map-node:active { background: #222; border-color: var(--vang); }

        /* --- JOURNAL (LOG) --- */
        .journal { background: #000; border: 1px solid var(--vien); border-radius: 10px; height: 160px; overflow-y: auto; padding: 10px; font-size: 12px; font-family: 'Courier New', monospace; line-height: 1.4; color: #999; }
        .log-time { color: #555; margin-right: 5px; }

        /* --- MODAL SYSTEM --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #1a1a1c; border: 1px solid var(--vang); border-radius: 20px; padding: 25px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 0 30px rgba(255,204,0,0.1); }
        .btn-modal { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* --- UTILS --- */
        .btn-gold { background: var(--vang); color: #000; }
        .btn-dark { background: #333; color: #fff; }
    </style>
</head>
<body>

<header>
    <div class="row">
        <div class="p-name">🤠 Ying <span id="ui-title" style="font-size:10px; color:#666">[Phàm Cốt]</span></div>
        <div id="ui-gold" style="font-weight:bold; color:var(--vang)">💎 10K</div>
    </div>
    <div class="row">
        <div id="ui-realm" style="font-size:14px; font-weight:bold;">Luyện Khí Tầng 1</div>
        <div class="combat-pwr">Lực chiến: 8.5K</div>
    </div>
    
    <div class="stat-group">
        <div class="stat-info"><span>Sinh lực</span><span id="txt-hp">100/100</span></div>
        <div class="bar-bg"><div id="bar-hp" class="bar-fill" style="background:var(--do)"></div></div>
    </div>
    <div class="stat-group">
        <div class="stat-info"><span>Linh lực</span><span id="txt-mp">0/100</span></div>
        <div class="bar-bg"><div id="bar-mp" class="bar-fill" style="background:var(--xanh-linh)"></div></div>
    </div>
    <div class="stat-group">
        <div class="stat-info"><span>Thể lực</span><span id="txt-st">100/100</span></div>
        <div class="bar-bg"><div id="bar-st" class="bar-fill" style="background:var(--xanh-the)"></div></div>
    </div>
</header>

<nav id="navbar">
    <button class="nav-item active" onclick="Engine.tab('world', this)">BẢN ĐỒ</button>
    <button class="nav-item" onclick="Engine.tab('sect', this)">MÔN PHÁI</button>
    <button class="nav-item" onclick="Engine.tab('inv', this)">TÚI ĐỒ</button>
    <button class="nav-item" onclick="Engine.tab('set', this)">CÀI ĐẶT</button>
</nav>

<div class="viewport">
    <div id="view-world" class="view-tab active">
        <div class="card">
            <h4 style="margin:0 0 10px 0; color:var(--vang)">🗺️ KHU VỰC 1: PHÀM GIỚI</h4>
            <div class="map-grid">
                <div class="map-node" onclick="Engine.explore('U Minh Động', 10)">
                    <b>U Minh Động</b><br><small>⚡ 10 | ⏳ 3s</small>
                </div>
                <div class="map-node" onclick="Engine.explore('Vạn Kiếp Sơn', 20)">
                    <b>Vạn Kiếp Sơn</b><br><small>⚡ 20 | ⏳ 5s</small>
                </div>
            </div>
        </div>
        <div class="journal" id="log-box"></div>
    </div>

    <div id="view-sect" class="view-tab">
        <div class="card">
            <h3 style="color:var(--vang)">Thiếu Lâm Tự</h3>
            <p style="font-size:12px; color:#888">Nơi rèn luyện căn cốt thép, bậc thầy phòng ngự.</p>
            <button class="btn-modal btn-gold" onclick="Engine.log('Cảnh giới chưa đủ để gia nhập!')">GIA NHẬP</button>
        </div>
    </div>

    <div id="view-inv" class="view-tab">
        <div style="display:grid; grid-template-columns:repeat(5, 1fr); gap:5px;" id="inv-grid">
            </div>
    </div>

    <div id="view-set" class="view-tab">
        <div class="card">
            <label style="font-size:12px; color:#666">API Key (Gemini):</label>
            <input type="password" id="api-key" style="width:100%; padding:12px; background:#000; color:#fff; border:1px solid #333; border-radius:8px; margin-top:5px;">
            <button class="btn-modal btn-gold" onclick="Engine.saveKey()">LƯU THẦN THỨC</button>
        </div>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <h3 id="modal-title" style="color:var(--vang); margin-top:0;">THÔNG BÁO</h3>
        <div id="modal-content" style="font-size:14px; line-height:1.6; color:#ccc; margin-bottom:20px;"></div>
        <button class="btn-modal btn-gold" onclick="Engine.closeModal()">XÁC NHẬN</button>
    </div>
</div>

<script>
/* ==========================================================
   ENGINE V20: THẦN CƠ DIỆU TOÁN
   ========================================================== */
const Engine = {
    // 1. DỮ LIỆU NHÂN VẬT
    player: JSON.parse(localStorage.getItem('ying_v20_save')) || {
        lv: 1, exp: 0, mExp: 100, 
        hp: 100, mHp: 100, 
        st: 100, mSt: 100, 
        gold: 10000, atk: 8500, inv: []
    },

    // 2. HỆ THỐNG LOG NHẬT KÝ
    log: function(msg, color = "#999") {
        const box = document.getElementById('log-box');
        const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
        box.innerHTML = `<div style="margin-bottom:5px; color:${color}"><span class="log-time">[${time}]</span> ${msg}</div>` + box.innerHTML;
    },

    // 3. THAO TÁC TAB
    tab: function(id, btn) {
        document.querySelectorAll('.view-tab').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        btn.classList.add('active');
        if(id === 'inv') this.renderInv();
    },

    // 4. HỆ THỐNG THÁM HIỂM (OPERABLE)
    explore: async function(name, cost) {
        if(this.player.st < cost) return this.log("Thể lực không đủ, hãy nghỉ ngơi!", "#ff4d4d");

        this.player.st -= cost;
        this.log(`Bắt đầu thám hiểm <b>${name}</b>...`, var(--xanh-linh));
        this.updateUI();

        // Giả lập thời gian chờ (⏳)
        const key = localStorage.getItem('ying_v20_api');
        let story = `Bạn đã thám hiểm ${name} và tìm thấy một vài linh thạch vụn.`;

        if(key) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemma-3-1b-it:generateContent?key=${key}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Viết 1 câu ngắn về tu sĩ Ying thám hiểm ${name} gặp kỳ ngộ.` }] }] })
                });
                const data = await res.json();
                story = data.candidates[0].content.parts[0].text.trim();
            } catch(e) {}
        }

        setTimeout(() => {
            this.player.exp += 20;
            this.player.gold += 50;
            this.openModal("KẾT QUẢ THÁM HIỂM", story);
            this.log(`Thám hiểm hoàn tất. Nhận 20 Linh lực & 50 Linh thạch.`, var(--vang));
            this.checkLevel();
            this.updateUI();
        }, 2000);
    },

    // 5. CẬP NHẬT GIAO DIỆN
    updateUI: function() {
        document.getElementById('ui-realm').innerText = `Luyện Khí Tầng ${this.player.lv}`;
        document.getElementById('ui-gold').innerText = `💎 ${this.player.gold.toLocaleString()}`;
        
        // Cập nhật các thanh chỉ số
        this.setBar('hp', this.player.hp, this.player.mHp);
        this.setBar('mp', this.player.exp, this.player.mExp);
        this.setBar('st', this.player.st, this.player.mSt);

        localStorage.setItem('ying_v20_save', JSON.stringify(this.player));
    },

    setBar: function(id, val, max) {
        document.getElementById(`txt-${id}`).innerText = `${val}/${max}`;
        document.getElementById(`bar-${id}`).style.width = (val / max) * 100 + "%";
    },

    // 6. MODAL & SETTINGS
    openModal: function(title, content) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-content').innerText = content;
        document.getElementById('modal').style.display = 'flex';
    },
    closeModal: function() { document.getElementById('modal').style.display = 'none'; },

    saveKey: function() {
        const k = document.getElementById('api-key').value.trim();
        localStorage.setItem('ying_v20_api', k);
        this.log("Đã nạp Thần Thức (API Key) thành công!", var(--xanh-linh));
    },

    renderInv: function() {
        const grid = document.getElementById('inv-grid');
        grid.innerHTML = "";
        for(let i=0; i<25; i++) {
            grid.innerHTML += `<div style="aspect-ratio:1/1; background:#1a1a1a; border:1px solid #333; border-radius:5px;"></div>`;
        }
    },

    checkLevel: function() {
        if(this.player.exp >= this.player.mExp) {
            this.player.lv++; this.player.exp = 0; this.player.mExp += 50;
            this.openModal("ĐỘT PHÁ!", "Chúc mừng đạo hữu đã thăng cấp cảnh giới!");
        }
    }
};

window.onload = () => {
    Engine.updateUI();
    const k = localStorage.getItem('ying_v20_api');
    if(k) document.getElementById('api-key').value = k;
    Engine.log("Thiên Đạo V20 khởi chạy thành công.");
};
</script>
</body>
</html>
