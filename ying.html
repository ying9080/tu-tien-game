<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tu Tiên Simulator v14.0</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { margin: 0; background: #080808; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Chỉ số Header */
        header { background: #000; padding: 15px; border-bottom: 2px solid #ffcc00; flex-shrink: 0; box-shadow: 0 2px 10px rgba(255,204,0,0.2); }
        .lv-title { font-size: 20px; font-weight: bold; color: #ffcc00; text-align: center; margin-bottom: 8px; text-shadow: 0 0 5px rgba(255,204,0,0.5); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 11px; }
        .bar-bg { width: 100%; height: 8px; background: #222; border-radius: 4px; margin-top: 3px; border: 1px solid #333; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.5s ease-in-out; }

        /* Menu */
        nav { display: flex; background: #111; flex-shrink: 0; border-bottom: 1px solid #222; }
        .m-btn { flex: 1; padding: 15px 0; border: none; background: none; color: #666; font-weight: bold; font-size: 11px; transition: 0.3s; }
        .m-btn.active { color: #ffcc00; border-bottom: 3px solid #ffcc00; background: #1a1a1a; }

        /* Nội dung chính */
        main { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .tab { display: none; height: 100%; }
        .tab.active { display: block; }
        .card { background: #151515; padding: 20px; border-radius: 12px; border: 1px solid #252525; text-align: center; margin-bottom: 15px; }
        
        /* Nút bấm */
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; margin-top: 10px; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn-train { background: #ffffff; color: #000; }
        .btn-exp { background: #00d2ff; color: #fff; box-shadow: 0 4px #008eb4; }
        .btn-gold { background: #ffcc00; color: #000; box-shadow: 0 4px #b8860b; }

        /* Khu vực viết văn (Log) */
        #log { background: #000; border: 1px solid #222; padding: 15px; border-radius: 10px; flex-grow: 1; overflow-y: auto; font-family: 'Georgia', serif; font-size: 14px; color: #bbb; line-height: 1.6; border-left: 4px solid #ffcc00; }
        .log-entry { margin-bottom: 12px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
