<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ying - Thiên Đạo Chí Tôn v16</title>
    <style>
        /* --- THIẾT LẬP PHONG CÁCH "SANG TRỌNG & U TỐI" --- */
        :root {
            --gold: #ffcc00; --gold-dark: #b8860b;
            --bg: #050505; --card-bg: rgba(20, 20, 22, 0.95);
            --border: #333; --text-main: #e0e0e0; --text-dim: #888;
            --red: #ff4d4d; --blue: #00d2ff; --green: #2ecc71;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; background: var(--bg); color: var(--text-main); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- HEADER: CHỈ SỐ NHÂN VẬT --- */
        header { 
            padding: 15px; background: #000; border-bottom: 1px solid var(--gold); 
            display: grid; grid-template-columns: auto 1fr; gap: 15px; flex-shrink: 0;
        }
        .avatar-frame { width: 50px; height: 50px; border: 2px solid var(--gold); border-radius: 10px; overflow: hidden; position: relative; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        .main-stats { display: flex; flex-direction: column; justify-content: space-between; }
        .lv-info { display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; }
        .resource-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .stat-bar { height: 6px; background: #222; border-radius: 3px; overflow: hidden; margin-top: 2px; border: 0.5px solid #444; }
        .bar-fill { height: 100%; transition: width 0.5s ease; }

        /* --- MAIN VIEW: KHUNG CỐT TRUYỆN --- */
        main { flex-grow: 1; position: relative; display: flex; flex-direction: column; padding: 15px; overflow: hidden; }
        .log-container { 
            flex-grow: 1; background: var(--card-bg); border: 1px solid var(--border); 
            border-radius: 15px; padding: 15px; overflow-y: auto;
            display: flex; flex-direction: column-reverse; box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }
        .log-entry { margin-bottom: 12px; font-size: 14px; line-height: 1.6; border-left: 3px solid transparent; padding-left: 10px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        /* --- BOTTOM DOCK: NÚT HÀNH ĐỘNG --- */
        .bottom-dock { 
            background: #111; padding: 10px 15px 20px 15px; 
            border-top: 1px solid var(--border); border-radius: 25px 25px 0 0; flex-shrink: 0;
        }
        .sub-info { display: flex; justify-content: space-around; font-size: 11px; margin-bottom: 10px; color: var(--text-dim); }
        .sub-info b { color: var(--gold); }
        .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .nav-btn { 
            padding: 12px 5px; background: #222; border: 1px solid #333; color: #777;
            border-radius: 10px; font-size: 10px; font-weight: bold; transition: 0.2s;
        }
        .nav-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }
        .btn-main { 
            grid-column: span 4; padding: 18px; margin-top: 10px; border-radius: 12px;
            font-size: 16px; font-weight: bold; border: none; cursor: pointer;
            background: linear-gradient(135deg, var(--gold), #ff8800); color: #000;
        }

        /* --- POPUP SỰ KIỆN (INSPIRED BY IMAGE_21) --- */
        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px;
        }
        .event-card { 
            background: #1a1a1c; border: 1px solid var(--gold); width: 100%; max-width: 350px;
            border-radius: 20px; padding: 25px; text-align: center; position: relative;
        }
        .event-img { width: 120px; height: 160px; background: #000; border-radius: 10px; margin: 0 auto 20px; border: 1px solid #444; }
        .event-title { color: var(--gold); font-size: 18px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        .event-text { font-size: 15px; color: #ccc; line-height: 1.7; font-style: italic; margin-bottom: 25px; }
        .event-btns { display: flex; gap: 10px; }
        .e-btn { flex: 1; padding: 15px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; }
        .btn-yes { background: var(--gold); color: #000; }
        .btn-no { background: #333; color: #fff; }

        /* --- TÚI ĐỒ (GRID 2050 Ô) --- */
        .inventory-view { display: none; height: 100%; }
        .inv-grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; 
            padding: 10px; max-height: 350px; overflow-y: auto; 
        }
        .inv-slot { aspect-ratio: 1/1; background: #222; border: 1px solid #333; border-radius: 8px; position: relative; }
        .inv-slot.gold { border-color: var(--gold); box-shadow: inset 0 0 10px rgba(255,204,0,0.2); }
    </style>
</head>
<body>

<header>
    <div class="avatar-frame">
        <img src="https://via.placeholder.com/50" alt="Ying">
    </div>
    <div class="main-stats">
        <div class="lv-info">
            <span id="ui-name">Đạo Hữu Ying</span>
            <span id="ui-lv" style="color:var(--gold)">Luyện Khí Tầng 1</span>
        </div>
        <div class="resource-row">
            <div>
                <div style="font-size:9px">❤️ SINH LỰC</div>
                <div class="stat-bar"><div id="bar-hp" class="bar-fill" style="width:100%; background:var(--red)"></div></div>
            </div>
            <div>
                <div style="font-size:9px">⚡ LINH LỰC</div>
                <div class="stat-bar"><div id="bar-ex" class="bar-fill" style="width:0%; background:var(--blue)"></div></div>
            </div>
        </div>
    </div>
</header>

<main>
    <div id="view-story" class="tab-view active">
        <div class="log-container" id="log">
            <div class="log-entry" style="color:var(--gold)">Hệ thống: Thiên Đạo V16 đã khởi khởi động. Ying, hãy bắt đầu con đường của ngươi.</div>
        </div>
    </div>

    <div id="view-inv" class="tab-view inventory-view">
        <h3 style="text-align:center; color:var(--gold)">Túi Trữ Vật (82/2050)</h3>
        <div class="inv-grid" id="inv-grid">
            </div>
    </div>
</main>

<div class="bottom-dock">
    <div class="sub-info">
        <span>⚔️ Công: <b id="ui-atk">10</b></span>
        <span>🛡️ Thủ: <b id="ui-def">5</b></span>
        <span>💰 Linh Thạch: <b id="ui-gold">1000</b></span>
    </div>
    <div class="action-grid">
        <button class="nav-btn active" onclick="changeTab('story', this)">BẢN ĐỒ</button>
        <button class="nav-btn" onclick="changeTab('inv', this)">TÚI ĐỒ</button>
        <button class="nav-btn">THẦN THÔNG</button>
        <button class="nav-btn" onclick="toggleSettings()">CÀI ĐẶT</button>
        <button class="btn-main" id="btn-explore" onclick="triggerEvent()">🚶 XUẤT THẾ THÁM HIỂM</button>
    </div>
</div>

<div class="overlay" id="event-overlay">
    <div class="event-card">
        <div class="event-title" id="ev-title">GẶP MẶT TU SĨ</div>
        <div class="event-img">
            <div style="padding-top:60px; color:#444">KỲ NGỘ</div>
        </div>
        <div class="event-text" id="ev-text">
            "Tại vì Bọn Chúng... Haizzz... Này người bạn trẻ, giúp ta một việc được chứ?"
        </div>
        <div class="event-btns">
            <button class="e-btn btn-yes" onclick="handleEvent('yes')">CHẤP NHẬN</button>
            <button class="e-btn btn-no" onclick="handleEvent('no')">TỪ CHỐI</button>
        </div>
    </div>
</div>

<script>
    /* --- HỆ THỐNG QUẢN LÝ MASTER STATE --- */
    const G = {
        p: { name: "Ying", lv: 1, title: "Phàm Nhân", hp: 100, mHp: 100, ex: 0, mEx: 100, gold: 1000, atk: 10, def: 5, inv: [] },
        settings: { apiKey: localStorage.getItem('ying_api_v16') || "" }
    };

    function log(m, color="#ccc") {
        const d = document.getElementById('log');
        d.innerHTML = `<div class="log-entry" style="color:${color}">— ${m}</div>` + d.innerHTML;
    }

    function changeTab(tab, btn) {
        document.querySelectorAll('.tab-view').forEach(v => v.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + tab).style.display = tab === 'inv' ? 'block' : 'none';
        if(tab === 'story') document.getElementById('view-story').style.display = 'flex';
        btn.classList.add('active');
        if(tab === 'inv') renderInv();
    }

    function renderInv() {
        const grid = document.getElementById('inv-grid');
        grid.innerHTML = "";
        for(let i=0; i<30; i++) { // Render 30 ô mẫu
            const slot = document.createElement('div');
            slot.className = 'inv-slot' + (i<2 ? ' gold' : '');
            grid.appendChild(slot);
        }
    }

    /* --- LOGIC TRUY VẤN THIÊN ĐẠO (AI) --- */
    async function triggerEvent() {
        if(!G.settings.apiKey) return alert("Vào Cài đặt nạp API Key!");
        
        const btn = document.getElementById('btn-explore');
        btn.disabled = true; btn.innerText = "ĐANG SOI QUẺ...";

        const prompt = "Bạn là nhà văn tiên hiệp. Hãy viết 1 câu dẫn thoại của một lão già thần bí gặp Ying giữa rừng, yêu cầu Ying giúp đỡ (dưới 30 chữ).";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemma-3-1b-it:generateContent?key=${G.settings.apiKey}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            const txt = data.candidates[0].content.parts[0].text.trim();
            
            // Hiển thị Pop-up theo phong cách ảnh 1000028158
            document.getElementById('ev-text').innerText = `"${txt}"`;
            document.getElementById('event-overlay').style.display = 'flex';
        } catch(e) {
            log("Thiên đạo nghẽn mạch, kỳ ngộ vụt qua...", "#888");
        }
        btn.disabled = false; btn.innerText = "🚶 XUẤT THẾ THÁM HIỂM";
    }

    function handleEvent(choice) {
        document.getElementById('event-overlay').style.display = 'none';
        if(choice === 'yes') {
            G.p.gold += 500;
            log("Ying chấp nhận yêu cầu, nhận được 500 Linh thạch trả lễ.", "#ffcc00");
        } else {
            log("Ying lạnh lùng rời đi, không muốn vướng vào nhân quả.", "#888");
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('ui-lv').innerText = `Luyện Khí Tầng ${G.p.lv}`;
        document.getElementById('bar-hp').style.width = (G.p.hp/G.p.mHp)*100 + "%";
        document.getElementById('bar-ex').style.width = (G.p.ex/G.p.mEx)*100 + "%";
        document.getElementById('ui-gold').innerText = G.p.gold;
        document.getElementById('ui-atk').innerText = G.p.atk;
        document.getElementById('ui-def').innerText = G.p.def;
    }

    function toggleSettings() {
        const key = prompt("Dán API Key vào đây:", G.settings.apiKey);
        if(key) {
            G.settings.apiKey = key;
            localStorage.setItem('ying_api_v16', key);
            log("Thiên Đạo ghi nhận: API Key đã nạp.", "#00d2ff");
        }
    }

    window.onload = updateUI;
</script>
</body>
</html>
