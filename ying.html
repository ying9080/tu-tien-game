<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tu Tiên Simulator v8.0</title>
    <style>
        * { box-sizing: border-box; }
        :root { --vang: #ffcc00; --den: #0a0a0a; --xam: #1a1a1a; --do: #ff4d4d; --xanh: #00d2ff; --chu: #e0e0e0; }
        body { margin: 0; background: var(--den); color: var(--chu); font-family: sans-serif; overflow-x: hidden; }
        
        /* Đầu trang */
        .header { background: #000; padding: 10px; border-bottom: 2px solid var(--vang); }
        .cap-do { font-size: 16px; font-weight: bold; color: var(--vang); margin-bottom: 5px; text-align: center; }
        .chi-so-nhanh { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 11px; }
        .thanh-mau-nen { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-top: 2px; }
        .thanh-chay { height: 100%; transition: 0.4s; }

        /* Menu */
        .menu { display: flex; background: #111; width: 100%; }
        .nut-menu { flex: 1; padding: 12px 0; border: none; background: none; color: #666; font-size: 11px; font-weight: bold; }
        .nut-menu.active { color: var(--vang); border-bottom: 2px solid var(--vang); background: #1a1a1a; }

        /* Nội dung */
        .vung-choi { padding: 15px; }
        .tab { display: none; }
        .tab.active { display: block; }
        .khung { background: var(--xam); padding: 15px; border-radius: 10px; border: 1px solid #333; text-align: center; margin-bottom: 10px; }
        
        .nut-bam { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; margin-top: 10px; color: #000; }
        .nut-tu { background: #fff; }
        .nut-di { background: var(--xanh); color: #fff; }
        .nut-api { background: var(--vang); }

        /* Nhật ký */
        .nhat-ky { background: #000; border: 1px solid #222; padding: 10px; border-radius: 8px; height: 180px; overflow-y: auto; font-size: 12px; color: #888; text-align: left; }
        .tui-do-o { background: #222; padding: 10px; border-radius: 5px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: 12px; }
    </style>
</head>
<body>

<div class="header">
    <div class="cap-do" id="txt-cap">Phàm Cốt Tầng 1</div>
    <div class="chi-so-nhanh">
        <div>Máu: <span id="txt-hp">100/100</span>
            <div class="thanh-mau-nen"><div id="bar-hp" class="thanh-chay" style="width:100%; background:var(--do)"></div></div>
        </div>
        <div>Linh Lực: <span id="txt-exp">0/100</span>
            <div class="thanh-mau-nen"><div id="bar-exp" class="thanh-chay" style="width:0%; background:var(--xanh)"></div></div>
        </div>
    </div>
    <div style="display:flex; justify-content:space-between; font-size:10px; margin-top:5px; color:#888;">
        <span>⚔️ Công: <b id="txt-atk" style="color:var(--vang)">10</b></span>
        <span>🛡️ Thủ: <b id="txt-def" style="color:var(--xanh)">5</b></span>
        <span>💰 Tiền: <b id="txt-gold" style="color:var(--vang)">0</b></span>
    </div>
</div>

<div class="menu">
    <button class="nut-menu active" onclick="moTab('tab-tu', this)">TU LUYỆN</button>
    <button class="nut-menu" onclick="moTab('tab-di', this)">THÁM HIỂM</button>
    <button class="nut-menu" onclick="moTab('tab-kho', this)">TÚI ĐỒ</button>
    <button class="nut-menu" onclick="moTab('tab-api', this)">CÀI ĐẶT</button>
</div>

<div class="vung-choi">
    <div id="tab-tu" class="tab active">
        <div class="khung">
            <h3 style="color:var(--vang); margin:0;">Tĩnh Tọa Động Phủ</h3>
            <button id="btn-tu" class="nut-bam nut-tu" onclick="hanhDong('tu')">🧘 VẬN CÔNG (25 EXP)</button>
            <button id="btn-break" class="nut-bam nut-api" style="display:none" onclick="hanhDong('pha')">🔥 ĐỘT PHÁ</button>
        </div>
    </div>

    <div id="tab-di" class="tab">
        <div class="khung">
            <h3 style="color:var(--xanh); margin:0;">Vạn Yêu Sơn</h3>
            <button class="nut-bam nut-di" onclick="goAI()" id="btn-go">🚶 XUẤT THẾ THÁM HIỂM</button>
        </div>
    </div>

    <div id="tab-kho" class="tab">
        <div class="khung">
            <h3 style="color:#2ecc71; margin:0;">Kho Đồ</h3>
            <div id="list-do" style="margin-top:10px; text-align:left;">Trống...</div>
        </div>
    </div>

    <div id="tab-api" class="tab">
        <div class="khung" style="text-align:left;">
            <h3 style="color:var(--do); margin:0;">Cài Đặt API</h3>
            <input type="password" id="input-api" style="width:100%; padding:12px; margin-top:10px; background:#222; color:#fff; border:1px solid #444; border-radius:5px;" placeholder="Dán mã API vào đây...">
            <button class="nut-bam nut-api" onclick="saveKey()">💾 LƯU MÃ</button>
        </div>
    </div>

    <div class="nhat-ky" id="log">
        <div>> Thiên Đạo V8.0 khởi chạy. Chào đạo hữu Ying!</div>
    </div>
</div>

<script>
    let p = {
        lv: 0, lvs: ["Phàm Cốt 1", "Phàm Cốt 5", "Phàm Cốt 9", "Luyện Khí Kỳ", "Trúc Cơ Kỳ"],
        hp: 100, mHp: 100, exp: 0, mExp: 100, gold: 0, atk: 10, def: 5, inv: []
    };

    function log(m) {
        const div = document.getElementById('log');
        div.innerHTML = `<div>> ${m}</div>` + div.innerHTML;
    }

    function moTab(id, btn) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nut-menu').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function saveKey() {
        localStorage.setItem('tu_tien_key', document.getElementById('input-api').value.trim());
        log("<span style='color:cyan'>Đã lưu mã API!</span>");
    }

    function upUI() {
        document.getElementById('txt-cap').innerText = p.lvs[p.lv];
        document.getElementById('txt-hp').innerText = p.hp + "/" + p.mHp;
        document.getElementById('bar-hp').style.width = (p.hp/p.mHp)*100 + "%";
        document.getElementById('txt-exp').innerText = p.exp + "/" + p.mExp;
        document.getElementById('bar-exp').style.width = (p.exp/p.mExp)*100 + "%";
        document.getElementById('txt-gold').innerText = p.gold;
        document.getElementById('txt-atk').innerText = p.atk;
        document.getElementById('txt-def').innerText = p.def;

        document.getElementById('btn-tu').style.display = p.exp >= p.mExp ? 'none' : 'block';
        document.getElementById('btn-break').style.display = p.exp >= p.mExp ? 'block' : 'none';

        const list = document.getElementById('list-do');
        if(p.inv.length == 0) list.innerHTML = "Trống...";
        else list.innerHTML = p.inv.map(i => `<div class="tui-do-o"><b>${i.n}</b> <span>${i.s}</span></div>`).join('');
    }

    function hanhDong(t) {
        if(t == 'tu') { p.exp += 25; log("Bế quan tu luyện, linh khí dồi dào."); }
        if(t == 'pha') {
            if(Math.random() > 0.4) { p.lv++; p.exp = 0; p.mExp += 50; p.atk += 10; log("Chúc mừng! Đã đột phá!"); }
            else { p.hp -= 20; log("Đột phá thất bại, thổ huyết!"); }
        }
        upUI();
    }

    async function goAI() {
        const key = localStorage.getItem('tu_tien_key');
        if(!key) return log("Chưa có mã API!");
        
        const btn = document.getElementById('btn-go');
        btn.disabled = true; btn.innerText = "ĐANG XEM QUẺ...";

        let r = Math.random();
        let type = r < 0.3 ? "XAU" : (r < 0.8 ? "BT" : "TOT");
        let q = `Viết 1 câu tu tiên 8 chữ: ${type=="XAU"?"bị quái đánh":"lượm linh thạch"}`;

        try {
            // SỬA LỖI 404: Dùng endpoint v1 ổn định nhất
            const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: q }] }] })
            });

            const data = await res.json();
            if(data.error) throw new Error(data.error.message);

            let txt = data.candidates[0].content.parts[0].text.trim();
            if(type=="XAU") { p.hp -= 15; log(`🔴 ${txt} (-15 Máu)`); }
            else if(type=="BT") { p.gold += 40; log(`🟡 ${txt} (+40 Vàng)`); }
            else { p.inv.push({n:"Kiếm Sắt", s:"+5 Công"}); p.atk += 5; log(`🟣 ${txt} (Nhận Kiếm)`); }
        } catch(e) {
            log(`<span style='color:orange'>Thiên đạo: ${e.message.substring(0,25)}</span>`);
            p.gold += 5; log("Nhặt được 5 đồng lẻ.");
        }
        btn.disabled = false; btn.innerText = "🚶 XUẤT THẾ THÁM HIỂM";
        upUI();
    }

    window.onload = () => {
        let k = localStorage.getItem('tu_tien_key');
        if(k) document.getElementById('input-api').value = k;
        upUI();
    };
</script>
</body>
</html>
